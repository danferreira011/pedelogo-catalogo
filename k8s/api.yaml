apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  selector:
    matchLabels:
      app: api
  template: 
    metadata:          
      labels:
        app: api
    spec:
      tolerations: #Cluster AWS - Tolerations para permitir que os pods sejam agendados em nós com a taint "dedicated=apps:NoSchedule"
      - key: "dedicated"
        operator: "Equal"
        value: "apps"
        effect: "NoSchedule"           
      containers:
      - name: api
        image: danferreira011/api-produto:{{tag}}
        ports:
        - containerPort: 80
        imagePullPolicy: Always
        resources: {}
        env:
          - name: Mongo__User
            value: mongouser
          - name: Mongo__Password
            value: mongopwd
          - name: Mongo__Host
            value: mongo-service
          - name: Mongo__DataBase
            value: admin

---

apiVersion: v1
kind: Service
metadata:
  name: api-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
spec:
  selector:
    app: api
  ports:
  - port: 80
    targetPort: 80
  type: LoadBalancer